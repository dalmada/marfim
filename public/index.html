<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Central de Agentes</title>
    <meta name="description" content="Ambiente online para testes do agente IA N8N">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/assets/favicon.png?v=3">
    <link rel="shortcut icon" type="image/png" href="/assets/favicon.png?v=3">
    <link rel="apple-touch-icon" href="/assets/favicon.png?v=3">
</head>

<body>
    <a href="#chat-messages" class="skip-link">Ir para mensagens</a>
    
    <!-- Tela Inicial: Grid de Agentes -->
    <main class="home-container" id="home-view">
        <header class="home-header">
            <img src="assets/marfim-logo.png" alt="Marfim Logo" class="marfim-logo">
            <h1>Central de<br class="mobile-break"> Agentes de IA</h1>
            <p>Selecione um assistente<br class="mobile-break"> para iniciar o atendimento</p>
        </header>
        
        <section class="agents-grid" id="agents-grid">
            <!-- Os cartões dos agentes serão injetados aqui via JS -->
            <div class="loading-agents">Carregando agentes...</div>
        </section>
    </main>

    <!-- Tela do Chat (Oculta por padrão) -->
    <main class="chat-container" id="chat-view" style="display: none;">
        <header class="chat-header">
            <button class="icon-btn back-btn" id="back-btn" aria-label="Voltar para a Home">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            <img src="" alt="Avatar do Agente" class="agent-avatar" id="current-agent-avatar" style="display: none;">
            <div class="agent-info">
                <h1 id="current-agent-name">Agente de IA</h1>
                <span class="status">Online</span>
            </div>
        </header>

        <section class="chat-messages" id="chat-messages" aria-live="polite" aria-label="Histórico de mensagens">
            <!-- Mensagens aparecerão aqui -->
        </section>

        <footer class="chat-input-area">
            <form id="chat-form" class="chat-form">
                <fieldset class="input-group">
                    <legend class="visually-hidden">Área de entrada de mensagem</legend>
                    <label for="message-input" class="visually-hidden">Digite sua mensagem</label>
                    <input type="text" id="message-input" placeholder="Digite sua mensagem..." autocomplete="off">

                    <button type="button" id="record-btn" class="icon-btn" aria-label="Gravar mensagem de áudio"
                        title="Gravar Áudio">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="22"></line>
                        </svg>
                    </button>

                    <button type="submit" id="send-btn" class="icon-btn primary" aria-label="Enviar mensagem">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2"
                            fill="none">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </fieldset>
            </form>
        </footer>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>

</html>
